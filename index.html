          };

          return icons[icon] || icons.dashboard;
        },

        async loadDashboardData() {
          this.dashboard.loading = true;
          this.dashboard.error = '';

          const paymentAccess = this.profile?.role === 'landlord' || this.permissions.can_view_payments || this.permissions.can_verify_payments;
          const today = new Date().toISOString().slice(0, 10);

          const queryResults = await Promise.all([
            supabaseClient.from('properties').select('id', { count: 'exact', head: true }),
            supabaseClient.from('units').select('id, status'),
            paymentAccess
              ? supabaseClient.from('payment_submissions').select('id', { count: 'exact', head: true }).eq('status', 'pending')
              : Promise.resolve({ count: 0, error: null }),
            paymentAccess
              ? supabaseClient
                .from('payments')
                .select('id, amount_paid, payment_date, payment_method, created_at, leases(tenants(full_name), units(unit_number))')
                .order('payment_date', { ascending: false })
                .limit(8)
              : Promise.resolve({ data: [], error: null }),
            supabaseClient
              .from('leases')
              .select('id, end_date, tenants(full_name), units(unit_number)')
              .eq('status', 'active')
              .gte('end_date', today)
              .order('end_date', { ascending: true })
              .limit(8)
          ]);

          const [propertiesResult, unitsResult, pendingResult, paymentsResult, leasesResult] = queryResults;
          const firstError = propertiesResult.error || unitsResult.error || pendingResult.error || paymentsResult.error || leasesResult.error;

          if (firstError) {
            this.dashboard.error = firstError.message;
          }

          const units = unitsResult.data || [];
          this.dashboard.stats = {
            properties: propertiesResult.count || 0,
            units: units.length,
            occupied: units.filter(unit => unit.status === 'occupied').length,
            vacant: units.filter(unit => unit.status === 'vacant').length,
            pendingSubmissions: pendingResult.count || 0
          };

          this.dashboard.recentPayments = (paymentsResult.data || []).map(payment => ({
            id: payment.id,
            tenant: payment.leases?.tenants?.full_name || '-',
            unit: payment.leases?.units?.unit_number || '-',
            amount: payment.amount_paid,
            date: payment.payment_date || payment.created_at,
            method: payment.payment_method
          }));

          this.dashboard.leaseExpirations = (leasesResult.data || []).map(lease => ({
            id: lease.id,
            tenant: lease.tenants?.full_name || '-',
            unit: lease.units?.unit_number || '-',
            endDate: lease.end_date,
            daysRemaining: this.daysUntil(lease.end_date)
          }));

          this.dashboard.loading = false;
        },

        daysUntil(dateValue) {
          const today = new Date();
          today.setHours(0, 0, 0, 0);
          const target = new Date(`${dateValue}T00:00:00`);
          return Math.ceil((target.getTime() - today.getTime()) / 86400000);
        },

        leaseDaysBadgeClass(days) {
          if (days <= 7) return 'bg-red-100 text-red-700';
          if (days <= 30) return 'bg-yellow-100 text-amber-700';
          return 'bg-emerald-100 text-emerald-700';
        },

        formatCurrency(value) {
          return new Intl.NumberFormat(undefined, {
            style: 'currency',
            currency: 'USD'
          }).format(Number(value || 0));
        },

        currentLandlordId() {
          if (this.profile?.role === 'landlord') return this.profile.id;
          return this.profile?.landlord_id || null;
        },

        canManageLeases() {
          return this.profile?.role === 'landlord' || Boolean(this.permissions.can_manage_leases);
        },

        canManageProperties() {
          return this.profile?.role === 'landlord';
        },

        async loadPropertyUnitData() {
          this.propertyUnit.loading = true;
          this.propertyUnit.error = '';

          const canLoadTenants = this.profile?.role === 'landlord' || this.permissions.can_view_tenants || this.permissions.can_manage_leases;
          const canLoadLeases = this.profile?.role === 'landlord' || this.permissions.can_manage_leases || this.permissions.can_view_tenants || this.permissions.can_view_payments || this.permissions.can_verify_payments;
          const results = await Promise.all([
            supabaseClient.from('properties').select('id, landlord_id, name, address, city, created_at').order('created_at', { ascending: false }),
            supabaseClient.from('units').select('id, property_id, unit_number, bedrooms, bathrooms, monthly_rent, status, created_at, properties(id, name, address, city)').order('created_at', { ascending: false }),
            canLoadTenants
              ? supabaseClient.from('tenants').select('id, landlord_id, profile_id, full_name, phone, email, id_number, invite_accepted, created_at').order('full_name', { ascending: true })
              : Promise.resolve({ data: [], error: null }),
            canLoadLeases
              ? supabaseClient.from('leases').select('id, unit_id, tenant_id, landlord_id, start_date, end_date, monthly_rent, deposit_amount, deposit_paid, lease_document_url, status, created_at, tenants(id, full_name, email, phone)').order('end_date', { ascending: true })
              : Promise.resolve({ data: [], error: null })
          ]);

          const [propertiesResult, unitsResult, tenantsResult, leasesResult] = results;
          const firstError = propertiesResult.error || unitsResult.error || tenantsResult.error || leasesResult.error;

          if (firstError) {
            this.propertyUnit.error = firstError.message;
          }

          this.propertyUnit.properties = propertiesResult.data || [];
          this.propertyUnit.units = (unitsResult.data || []).map(unit => ({
            ...unit,
            property: unit.properties || null
          }));
          this.propertyUnit.tenants = tenantsResult.data || [];
          this.propertyUnit.leases = (leasesResult.data || []).map(lease => ({
            ...lease,
            tenant: lease.tenants || null
          }));

          if (this.propertyUnit.selectedUnit) {
            const refreshedUnit = this.propertyUnit.units.find(unit => unit.id === this.propertyUnit.selectedUnit.id);
            this.propertyUnit.selectedUnit = refreshedUnit || null;
            if (refreshedUnit) await this.loadUnitDetail(refreshedUnit);
          }

          this.propertyUnit.loading = false;
        },

        async addProperty() {
          this.propertyUnit.error = '';
          this.propertyUnit.saving = true;

          const { error } = await supabaseClient
            .from('properties')
            .insert({
              landlord_id: this.currentLandlordId(),
              name: this.propertyUnit.propertyForm.name,
              address: this.propertyUnit.propertyForm.address,
              city: this.propertyUnit.propertyForm.city
            });

          if (error) {
            this.propertyUnit.error = error.message;
            this.propertyUnit.saving = false;
            return;
          }

          this.propertyUnit.propertyForm = { name: '', address: '', city: '' };
          this.propertyUnit.saving = false;
          await this.loadPropertyUnitData();
          await this.loadDashboardData();
        },

        async addUnit() {
          this.propertyUnit.error = '';
          this.propertyUnit.saving = true;

          const { error } = await supabaseClient
            .from('units')
            .insert({
              property_id: this.propertyUnit.unitForm.propertyId,
              unit_number: this.propertyUnit.unitForm.unitNumber,
              bedrooms: Number(this.propertyUnit.unitForm.bedrooms || 0),
              bathrooms: Number(this.propertyUnit.unitForm.bathrooms || 0),
              monthly_rent: Number(this.propertyUnit.unitForm.monthlyRent || 0),
              status: 'vacant'
            });

          if (error) {
            this.propertyUnit.error = error.message;
            this.propertyUnit.saving = false;
            return;
          }

          this.propertyUnit.unitForm = {
            propertyId: this.propertyUnit.selectedPropertyId || '',
            unitNumber: '',
            bedrooms: 1,
            bathrooms: 1,
            monthlyRent: 0
          };
          this.propertyUnit.saving = false;
          await this.loadPropertyUnitData();
          await this.loadDashboardData();
        },

        async createLease(payload) {
          const { data, error } = await supabaseClient
            .from('leases')
            .insert({
              unit_id: payload.unitId,
              tenant_id: payload.tenantId,
              landlord_id: this.currentLandlordId(),
              start_date: payload.startDate,
              end_date: payload.endDate,
              monthly_rent: Number(payload.monthlyRent || 0),
              deposit_amount: Number(payload.depositAmount || 0),
              deposit_paid: Boolean(payload.depositPaid),
              lease_document_url: payload.leaseDocumentUrl || null,
              status: 'active'
            })
            .select('id')
            .single();

          if (error) throw error;
          return data;
        },

        openPropertyUnits(propertyId) {
          this.propertyUnit.selectedPropertyId = propertyId;
          this.propertyUnit.unitForm.propertyId = propertyId;
          this.navigate('units');
        },

        filteredUnits() {
          if (!this.propertyUnit.selectedPropertyId) return this.propertyUnit.units;
          return this.propertyUnit.units.filter(unit => unit.property_id === this.propertyUnit.selectedPropertyId);
        },

        propertyName(propertyId) {
          return this.propertyUnit.properties.find(property => property.id === propertyId)?.name || '-';
        },

        unitCountForProperty(propertyId) {
          return this.propertyUnit.units.filter(unit => unit.property_id === propertyId).length;
        },

        async viewUnit(unit) {
          this.propertyUnit.selectedUnit = unit;
          this.propertyUnit.detailMode = '';
          await this.loadUnitDetail(unit);
        },

        async loadUnitDetail(unit) {
          this.propertyUnit.error = '';
          const activeLease = this.propertyUnit.leases.find(lease => lease.unit_id === unit.id && lease.status === 'active') || null;
          this.propertyUnit.currentLease = activeLease;

          const [paymentsResult, maintenanceResult] = await Promise.all([
            activeLease
              ? supabaseClient.from('payments').select('id, lease_id, amount_paid, payment_date, payment_method, notes, receipt_number, recorded_by, created_at').eq('lease_id', activeLease.id).order('payment_date', { ascending: false })
              : Promise.resolve({ data: [], error: null }),
            supabaseClient.from('maintenance_requests').select('id, unit_id, lease_id, description, status, priority, resolution_notes, created_at, resolved_at').eq('unit_id', unit.id).order('created_at', { ascending: false })
          ]);

          const firstError = paymentsResult.error || maintenanceResult.error;
          if (firstError) this.propertyUnit.error = firstError.message;

          this.propertyUnit.payments = paymentsResult.data || [];
          this.propertyUnit.maintenance = maintenanceResult.data || [];
        },

        startEditSelectedUnit() {
          const unit = this.propertyUnit.selectedUnit;
          if (!unit) return;

          this.propertyUnit.detailMode = 'edit';
          this.propertyUnit.editUnitForm = {
            unitNumber: unit.unit_number,
            bedrooms: Number(unit.bedrooms || 0),
            bathrooms: Number(unit.bathrooms || 0),
            monthlyRent: Number(unit.monthly_rent || 0)
          };
        },

        async saveSelectedUnitEdit() {
          const unit = this.propertyUnit.selectedUnit;
          if (!unit) return;

          const { error } = await supabaseClient
            .from('units')
            .update({
              unit_number: this.propertyUnit.editUnitForm.unitNumber,
              bedrooms: Number(this.propertyUnit.editUnitForm.bedrooms || 0),
              bathrooms: Number(this.propertyUnit.editUnitForm.bathrooms || 0),
              monthly_rent: Number(this.propertyUnit.editUnitForm.monthlyRent || 0)
            })
            .eq('id', unit.id);

          if (error) {
            this.propertyUnit.error = error.message;
            return;
          }

          this.propertyUnit.detailMode = '';
          await this.loadPropertyUnitData();
        },

        async prepareAssignTenant(unit) {
          if (!unit) return;
          this.propertyUnit.selectedUnit = unit;
          await this.loadUnitDetail(unit);
          this.propertyUnit.detailMode = 'assign';
          this.propertyUnit.assignForm = {
            tenantId: '',
            startDate: new Date().toISOString().slice(0, 10),
            endDate: '',
            rent: Number(unit.monthly_rent || 0),
            depositAmount: 0,
            depositPaid: false
          };
        },

        unassignedTenants() {
          const activeTenantIds = new Set(this.propertyUnit.leases.filter(lease => lease.status === 'active').map(lease => lease.tenant_id));
          return this.propertyUnit.tenants.filter(tenant => !activeTenantIds.has(tenant.id));
        },

        async assignTenantToSelectedUnit() {
          const unit = this.propertyUnit.selectedUnit;
          if (!unit) return;

          try {
            if (this.propertyUnit.currentLease) {
              const { error: updateError } = await supabaseClient
                .from('leases')
                .update({ status: 'terminated' })
                .eq('id', this.propertyUnit.currentLease.id);

              if (updateError) throw updateError;
            }

            await this.createLease({
              unitId: unit.id,
              tenantId: this.propertyUnit.assignForm.tenantId,
              startDate: this.propertyUnit.assignForm.startDate,
              endDate: this.propertyUnit.assignForm.endDate,
              monthlyRent: this.propertyUnit.assignForm.rent,
              depositAmount: this.propertyUnit.assignForm.depositAmount,
              depositPaid: this.propertyUnit.assignForm.depositPaid
            });

            this.propertyUnit.detailMode = '';
            await this.loadPropertyUnitData();
            await this.loadDashboardData();
          } catch (error) {
            this.propertyUnit.error = error.message;
          }
        },

        prepareUnitPayment() {
          if (!this.propertyUnit.currentLease) {
            this.propertyUnit.error = 'A unit needs an active lease before a payment can be logged.';
            return;
          }

          this.propertyUnit.detailMode = 'payment';
          this.propertyUnit.paymentForm = {
            amount: Number(this.propertyUnit.currentLease.monthly_rent || 0),
            date: new Date().toISOString().slice(0, 10),
            method: 'cash',
            notes: ''
          };
        },

        async logPaymentForSelectedUnit() {
          if (!this.propertyUnit.currentLease) return;

          const { error } = await supabaseClient
            .from('payments')
            .insert({
              lease_id: this.propertyUnit.currentLease.id,
              submission_id: null,
              amount_paid: Number(this.propertyUnit.paymentForm.amount || 0),
              payment_date: this.propertyUnit.paymentForm.date,
              payment_method: this.propertyUnit.paymentForm.method,
              notes: this.propertyUnit.paymentForm.notes || null,
              recorded_by: this.profile.id
            });

          if (error) {
            this.propertyUnit.error = error.message;
            return;
          }

          this.propertyUnit.detailMode = '';
          await this.loadUnitDetail(this.propertyUnit.selectedUnit);
          await this.loadDashboardData();
        },

        maintenanceBadgeClass(status) {
          const classes = {
            open: 'bg-yellow-100 text-amber-700',
            in_progress: 'bg-yellow-100 text-amber-700',
            resolved: 'bg-emerald-100 text-emerald-700'
          };
          return classes[status] || 'bg-slate-100 text-slate-600';
        },

        async loadTenantLeaseData() {
          this.tenantLease.loading = true;
          this.tenantLease.error = '';

          const results = await Promise.all([
            supabaseClient.from('properties').select('id, landlord_id, name, address, city, created_at').order('name', { ascending: true }),
            supabaseClient.from('units').select('id, property_id, unit_number, bedrooms, bathrooms, monthly_rent, status, properties(id, name, address, city)').order('unit_number', { ascending: true }),
            supabaseClient.from('tenants').select('id, landlord_id, profile_id, full_name, phone, email, id_number, invite_token, invite_accepted, created_at').order('created_at', { ascending: false }),
            supabaseClient.from('leases').select('id, unit_id, tenant_id, landlord_id, start_date, end_date, monthly_rent, deposit_amount, deposit_paid, lease_document_url, status, created_at, tenants(id, full_name, email, phone), units(id, unit_number, property_id, properties(id, name, address, city))').order('created_at', { ascending: false })
          ]);

          const [propertiesResult, unitsResult, tenantsResult, leasesResult] = results;
          const firstError = propertiesResult.error || unitsResult.error || tenantsResult.error || leasesResult.error;
          if (firstError) this.tenantLease.error = firstError.message;

          this.tenantLease.properties = propertiesResult.data || [];
          this.tenantLease.units = (unitsResult.data || []).map(unit => ({ ...unit, property: unit.properties || null }));
          this.tenantLease.tenants = tenantsResult.data || [];
          this.tenantLease.leases = (leasesResult.data || []).map(lease => ({
            ...lease,
            tenant: lease.tenants || null,
            unit: lease.units || null
          }));

          if (this.tenantLease.selectedTenant) {
            const refreshedTenant = this.tenantLease.tenants.find(tenant => tenant.id === this.tenantLease.selectedTenant.id);
            if (refreshedTenant) await this.viewTenant(refreshedTenant);
          }

          if (this.tenantLease.selectedLease) {
            const refreshedLease = this.tenantLease.leases.find(lease => lease.id === this.tenantLease.selectedLease.id);
            if (refreshedLease) await this.viewLease(refreshedLease);
          }

          this.tenantLease.loading = false;
        },

        async addTenantInvite() {
          this.tenantLease.error = '';
          this.tenantLease.saving = true;
          this.tenantLease.generatedInviteLink = '';

          const token = this.generateSecureToken();
          const { data: tenantRow, error: tenantError } = await supabaseClient
            .from('tenants')
            .insert({
              landlord_id: this.currentLandlordId(),
              full_name: this.tenantLease.tenantForm.fullName,
              phone: this.tenantLease.tenantForm.phone || null,
              email: this.tenantLease.tenantForm.email,
              id_number: this.tenantLease.tenantForm.idNumber || null,
              invite_token: token,
              invite_accepted: false
            })
            .select('id')
            .single();

          if (tenantError) {
            this.tenantLease.error = tenantError.message;
            this.tenantLease.saving = false;
            return;
          }

          const { error: inviteError } = await supabaseClient
            .from('invite_tokens')
            .insert({
              token,
              email: this.tenantLease.tenantForm.email,
              role: 'tenant',
              landlord_id: this.currentLandlordId(),
              metadata: {
                tenant_id: tenantRow.id,
                full_name: this.tenantLease.tenantForm.fullName,
                phone: this.tenantLease.tenantForm.phone || '',
                id_number: this.tenantLease.tenantForm.idNumber || ''
              },
              expires_at: this.addHoursIso(48)
            });

          if (inviteError) {
            this.tenantLease.error = inviteError.message;
            this.tenantLease.saving = false;
            return;
          }

          this.tenantLease.generatedInviteLink = this.buildInviteLink(token);
          this.tenantLease.tenantForm = { fullName: '', phone: '', email: '', idNumber: '' };
          this.tenantLease.saving = false;
          await this.loadTenantLeaseData();
        },

        tenantActiveLease(tenantId) {
          return this.tenantLease.leases.find(lease => lease.tenant_id === tenantId && lease.status === 'active') || null;
        },

        tenantUnitLabel(tenantId) {
          const lease = this.tenantActiveLease(tenantId);
          return lease ? this.leaseUnitLabel(lease) : '-';
        },

        leaseUnitLabel(lease) {
          return lease?.unit?.unit_number || lease?.units?.unit_number || '-';
        },

        leasePropertyLabel(lease) {
          const property = lease?.unit?.properties || lease?.unit?.property || lease?.units?.properties;
          return property?.name || '-';
        },

        async viewTenant(tenant) {
          this.tenantLease.selectedTenant = tenant;
          this.tenantLease.selectedTenantLeases = this.tenantLease.leases.filter(lease => lease.tenant_id === tenant.id);
          const leaseIds = this.tenantLease.selectedTenantLeases.map(lease => lease.id);

          if (leaseIds.length === 0) {
            this.tenantLease.selectedTenantPayments = [];
            return;
          }

          const { data, error } = await supabaseClient
            .from('payments')
            .select('id, lease_id, amount_paid, payment_date, payment_method, notes, receipt_number, created_at')
            .in('lease_id', leaseIds)
            .order('payment_date', { ascending: false });

          if (error) {
            this.tenantLease.error = error.message;
            return;
          }

          this.tenantLease.selectedTenantPayments = data || [];
        },

        tenantsAvailableForLease() {
          const activeTenantIds = new Set(this.tenantLease.leases.filter(lease => lease.status === 'active').map(lease => lease.tenant_id));
          return this.tenantLease.tenants.filter(tenant => !activeTenantIds.has(tenant.id));
        },

        vacantUnitsForLeaseForm() {
          return this.tenantLease.units.filter(unit => {
            const propertyMatches = !this.tenantLease.leaseForm.propertyId || unit.property_id === this.tenantLease.leaseForm.propertyId;
            return propertyMatches && unit.status === 'vacant';
          });
        },

        prefillLeaseRent() {
          const unit = this.tenantLease.units.find(item => item.id === this.tenantLease.leaseForm.unitId);
          if (unit) this.tenantLease.leaseForm.rent = Number(unit.monthly_rent || 0);
        },

        async addLeaseFromPage() {
          this.tenantLease.error = '';
          this.tenantLease.saving = true;

          try {
            await this.createLease({
              unitId: this.tenantLease.leaseForm.unitId,
              tenantId: this.tenantLease.leaseForm.tenantId,
              startDate: this.tenantLease.leaseForm.startDate,
              endDate: this.tenantLease.leaseForm.endDate,
              monthlyRent: this.tenantLease.leaseForm.rent,
              depositAmount: this.tenantLease.leaseForm.depositAmount,
              depositPaid: this.tenantLease.leaseForm.depositPaid
            });

            this.tenantLease.leaseForm = {
              tenantId: '',
              propertyId: '',
              unitId: '',
              startDate: '',
              endDate: '',
              rent: 0,
              depositAmount: 0,
              depositPaid: false
            };
            await this.loadTenantLeaseData();
            await this.loadPropertyUnitData();
            await this.loadDashboardData();
          } catch (error) {
            this.tenantLease.error = error.message;
          }

          this.tenantLease.saving = false;
        },

        async viewLease(lease) {
          this.tenantLease.selectedLease = lease;
          const { data, error } = await supabaseClient
            .from('payments')
            .select('id, lease_id, amount_paid, payment_date, payment_method, notes, receipt_number, created_at')
            .eq('lease_id', lease.id)
            .order('payment_date', { ascending: false });

          if (error) {
            this.tenantLease.error = error.message;
            return;
          }

          this.tenantLease.selectedLeasePayments = data || [];
        },

        async loadMyAccountData() {
          if (this.profile?.role !== 'landlord') return;

          this.account.loading = true;
          this.account.error = '';

          const { data, error } = await supabaseClient
            .from('landlord_subscriptions')
            .select('id, landlord_id, status, expires_at, notes, updated_at, created_at')
            .eq('landlord_id', this.profile.id)
            .maybeSingle();

          if (error) {
            this.account.error = error.message;
          }

          this.account.subscription = data || null;
          this.account.loading = false;
        },

        accountDaysRemaining() {
          if (!this.account.subscription?.expires_at) return '-';
          const days = this.daysUntil(this.account.subscription.expires_at.slice(0, 10));
          if (days < 0) return 'Expired';
          if (days === 0) return 'Expires today';
          return `${days} days`;
        },

        async signIn() {
          this.authError = '';
          this.successMessage = '';
          this.authLoading = true;

          const { data, error } = await supabaseClient.auth.signInWithPassword({
            email: this.loginForm.email,
            password: this.loginForm.password
          });

          this.authLoading = false;

          if (error) {
            this.authError = error.message;
            return;
          }

          if (data.user) {
            await this.loadAuthenticatedUser(data.user);
          }
        },

        async loadAuthenticatedUser(authUser) {
          this.booting = true;
          this.user = authUser;
          this.authError = '';

          const { data: profile, error: profileError } = await supabaseClient
            .from('profiles')
            .select('*')
            .eq('id', authUser.id)
            .maybeSingle();

          if (profileError || !profile) {
            await supabaseClient.auth.signOut();
            this.authError = profileError?.message || 'Your login exists, but no RentRadar profile is linked to this account. Create or repair the matching profiles row in Supabase.';
            this.currentShell = 'login';
            this.booting = false;
            return;
          }

          this.profile = profile;

          if (profile.role === 'super_admin') {
            this.currentShell = 'super_admin';
            this.currentPage = 'landlord-management';
            this.pageTitle = 'Landlord Management';
            await this.loadSuperAdminData();
            this.booting = false;
            return;
          }

          if (profile.role === 'landlord') {
            const hasAccess = await this.checkLandlordSubscription(profile.id);
            if (!hasAccess) {
              this.currentShell = 'suspended';
              this.booting = false;
              return;
            }

            this.currentShell = 'app';
            this.currentPage = 'dashboard';
            this.pageTitle = 'Dashboard';
            await this.loadUnreadCount(profile.id);
            await this.loadDashboardData();
            await this.loadMyAccountData();
            this.booting = false;
            return;
          }

          if (profile.role === 'staff') {
            await this.loadStaffPermissions(profile.id);
            this.currentShell = 'app';
            this.currentPage = 'dashboard';
            this.pageTitle = 'Dashboard';
            await this.loadUnreadCount(profile.id);
            await this.loadDashboardData();
            this.booting = false;
            return;
          }

          if (profile.role === 'tenant') {
            this.currentShell = 'tenant';
            this.currentPage = 'tenant-home';
            this.pageTitle = 'Home';
            await this.loadUnreadCount(profile.id);
            this.booting = false;
            return;
          }

          await supabaseClient.auth.signOut();
          this.authError = 'This account role is not supported.';
          this.currentShell = 'login';
          this.booting = false;
        },

        async checkLandlordSubscription(landlordId) {
          const { data, error } = await supabaseClient
            .from('landlord_subscriptions')
            .select('status, expires_at, notes')
            .eq('landlord_id', landlordId)
            .maybeSingle();

          if (error || !data) {
            this.subscription = null;
            return false;
          }

          this.subscription = data;
          const expiresAt = new Date(data.expires_at);
          const activeStatus = data.status === 'active' || data.status === 'trial';
          return activeStatus && expiresAt.getTime() > Date.now();
        },

        async loadStaffPermissions(staffProfileId) {
          const { data, error } = await supabaseClient
            .from('staff_permissions')
            .select('*')
            .eq('staff_profile_id', staffProfileId)
            .maybeSingle();

          if (!error && data) {
            this.permissions = {
              all_properties: Boolean(data.all_properties),
              property_ids: data.property_ids || [],
              can_view_tenants: Boolean(data.can_view_tenants),
              can_manage_maintenance: Boolean(data.can_manage_maintenance),
              can_view_payments: Boolean(data.can_view_payments),
              can_verify_payments: Boolean(data.can_verify_payments),
              can_manage_leases: Boolean(data.can_manage_leases)
            };
          }
        },

        async loadUnreadCount(profileId) {
          const { count, error } = await supabaseClient
            .from('notifications')
            .select('id', { count: 'exact', head: true })
            .eq('profile_id', profileId)
            .eq('is_read', false);

          if (!error) {
            this.unreadCount = count || 0;
          }
        },

        async navigate(page) {
          this.currentPage = page;
          this.pageTitle = this.titleForPage(page);
          this.sidebarOpen = false;

          if (page === 'dashboard' && this.currentShell === 'app') {
            await this.loadDashboardData();
          }

          if ((page === 'properties' || page === 'units') && this.currentShell === 'app') {
            await this.loadPropertyUnitData();
          }

          if ((page === 'tenants' || page === 'leases') && this.currentShell === 'app') {
            await this.loadTenantLeaseData();
          }

          if (page === 'my-account' && this.currentShell === 'app') {
            await this.loadMyAccountData();
          }
        },

        titleForPage(page) {
          const titles = {
            dashboard: 'Dashboard',
            properties: 'Properties',
            units: 'Units',
            tenants: 'Tenants',
            leases: 'Leases',
            payments: 'Payments',
            maintenance: 'Maintenance',
            staff: 'Staff',
            notifications: 'Notifications',
            'my-account': 'My Account',
            settings: 'Settings',
            'tenant-home': 'Home',
            'tenant-payments': 'Payments',
            'tenant-maintenance': 'Maintenance',
            'tenant-notifications': 'Notifications',
            'tenant-settings': 'Settings'
          };

          return titles[page] || 'RentRadar';
        },

        async logout() {
          await supabaseClient.auth.signOut();
          this.resetSessionState();
        },

        resetSessionState() {
          this.user = null;
          this.profile = null;
          this.subscription = null;
          this.permissions = {
            all_properties: false,
            property_ids: [],
            can_view_tenants: false,
            can_manage_maintenance: false,
            can_view_payments: false,
            can_verify_payments: false,
            can_manage_leases: false
          };
          this.unreadCount = 0;
          this.currentShell = 'login';
          this.currentPage = 'dashboard';
          this.pageTitle = 'Dashboard';
          this.loginForm.password = '';
          this.booting = false;
        }
      };
    }
  </script>
</body>
</html>
